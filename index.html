<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PixelShare – Multimedia Sharing Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #1a1f2e, #252d3d);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2e3650;
    }
    header h1 { font-size: 1.8rem; color: #7c9fff; letter-spacing: 1px; }
    header span { color: #aaa; font-size: 0.9rem; }

    .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }

    .upload-card {
      background: #1a1f2e;
      border: 1px solid #2e3650;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 36px;
    }
    .upload-card h2 { color: #7c9fff; margin-bottom: 18px; font-size: 1.2rem; }

    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .form-row input, .form-row select {
      flex: 1;
      min-width: 200px;
      background: #0f1117;
      border: 1px solid #2e3650;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.95rem;
    }
    .form-row input[type="file"] { padding: 8px; cursor: pointer; }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #7c9fff; color: #0f1117; }
    .btn-danger { background: #e05c5c; color: #fff; }
    .btn-secondary { background: #2e3650; color: #e0e0e0; }

    #status-msg {
      margin-top: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg-success { background: #1a3a2a; border: 1px solid #2e7d4f; color: #6fcf97; display: block !important; }
    .msg-error   { background: #3a1a1a; border: 1px solid #7d2e2e; color: #eb5757; display: block !important; }
    .msg-info    { background: #1a2a3a; border: 1px solid #2e4d7d; color: #7cb8ff; display: block !important; }

    .section-title { font-size: 1.1rem; color: #7c9fff; margin-bottom: 16px; }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }
    .media-card {
      background: #1a1f2e;
      border: 1px solid #2e3650;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .media-card:hover { transform: translateY(-3px); border-color: #7c9fff55; }

    .media-card img, .media-card video {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #0f1117;
      display: block;
    }
    .media-card-body { padding: 14px; }
    .media-card-body h3 { font-size: 0.95rem; margin-bottom: 6px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .media-card-body .tags { font-size: 0.8rem; color: #7c9fff; margin-bottom: 10px; }
    .media-card-body .meta { font-size: 0.78rem; color: #666; margin-bottom: 12px; }
    .media-card-body .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 0.75rem;
      margin-bottom: 10px;
    }
    .status-approved { background: #1a3a2a; color: #6fcf97; }
    .status-rejected { background: #3a1a1a; color: #eb5757; }
    .status-pending  { background: #2a2a1a; color: #f2c94c; }

    .card-actions { display: flex; gap: 8px; }

    /* Edit Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #000a;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1f2e;
      border: 1px solid #2e3650;
      border-radius: 14px;
      padding: 28px;
      width: 420px;
      max-width: 95vw;
    }
    .modal h2 { color: #7c9fff; margin-bottom: 18px; }
    .modal input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2e3650;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .empty-state { text-align: center; color: #555; padding: 60px 20px; }
    .empty-state p { margin-top: 10px; font-size: 0.9rem; }

    #loading { text-align: center; color: #555; padding: 40px; display: none; }
  </style>
</head>
<body>

<header>
  <h1>📷 PixelShare</h1>
  <span>Serverless Multimedia Platform · Azure Cloud</span>
</header>

<div class="container">

  <!-- Upload Section -->
  <div class="upload-card">
    <h2>⬆ Upload Media</h2>
    <div class="form-row">
      <input type="text" id="input-title" placeholder="Title (e.g. Sunset at Brighton)" />
      <input type="text" id="input-tags" placeholder="Tags (comma separated, e.g. nature,travel)" />
    </div>
    <div class="form-row">
      <input type="file" id="input-file" accept="image/*,video/*" />
      <button class="btn btn-primary" onclick="uploadMedia()">Upload</button>
    </div>
    <div id="status-msg"></div>
  </div>

  <!-- Media Gallery -->
  <div class="section-title">🖼 Media Gallery</div>
  <div id="loading">Loading...</div>
  <div id="media-grid" class="media-grid"></div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h2>✏️ Edit Media</h2>
    <input type="hidden" id="edit-id" />
    <input type="text" id="edit-title" placeholder="Title" />
    <input type="text" id="edit-tags" placeholder="Tags (comma separated)" />
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // CONFIGURATION — update these after deploying Azure Functions
  // ============================================================
 const API_BASE = window.PIXELSHARE_API || 'https://pixelshare-fn2.azurewebsites.net/api';
  // ============================================================

  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = `msg-${type}`;
  }

  async function uploadMedia() {
    const title = document.getElementById('input-title').value.trim();
    const tags  = document.getElementById('input-tags').value.trim();
    const file  = document.getElementById('input-file').files[0];

    if (!title || !file) { showStatus('Please provide a title and select a file.', 'error'); return; }

    showStatus('Uploading...', 'info');

    const formData = new FormData();
    formData.append('file', file);
    formData.append('title', title);
    formData.append('tags', tags);

    try {
      const res = await fetch(`${API_BASE}/UploadMedia`, { method: 'POST', body: formData });
      if (!res.ok) throw new Error(await res.text());
      showStatus('Uploaded successfully! Processing tags...', 'success');
      document.getElementById('input-title').value = '';
      document.getElementById('input-tags').value = '';
      document.getElementById('input-file').value = '';
      setTimeout(loadMedia, 2000);
    } catch (e) {
      showStatus(`Upload failed: ${e.message}`, 'error');
    }
  }

  async function loadMedia() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('media-grid').innerHTML = '';
    try {
      const res = await fetch(`${API_BASE}/GetAllMedia`);
      const items = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (!items.length) {
        document.getElementById('media-grid').innerHTML = `
          <div class="empty-state">
            <div style="font-size:3rem">📭</div>
            <p>No media uploaded yet. Upload something above!</p>
          </div>`;
        return;
      }

      items.forEach(item => renderCard(item));
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('media-grid').innerHTML = `<div class="empty-state"><p>Could not load media. Check API URL.</p></div>`;
    }
  }

  function renderCard(item) {
    const grid = document.getElementById('media-grid');
    const isVideo = item.mediaType && item.mediaType.startsWith('video');
    const mediaEl = isVideo
      ? `<video src="${item.blobUrl}" controls></video>`
      : `<img src="${item.blobUrl}" alt="${item.title}" onerror="this.src='https://via.placeholder.com/260x180?text=No+Preview'" />`;

    const statusClass = item.moderationStatus === 'approved' ? 'status-approved'
                      : item.moderationStatus === 'rejected' ? 'status-rejected'
                      : 'status-pending';
    const statusLabel = item.moderationStatus || 'pending';

    const tags = Array.isArray(item.tags) ? item.tags.join(', ') : (item.tags || '');
    const date = item.uploadedAt ? new Date(item.uploadedAt).toLocaleDateString() : '';

    const card = document.createElement('div');
    card.className = 'media-card';
    card.innerHTML = `
      ${mediaEl}
      <div class="media-card-body">
        <h3 title="${item.title}">${item.title}</h3>
        <div class="tags">🏷 ${tags || 'No tags yet'}</div>
        <div class="meta">📅 ${date}</div>
        <span class="status-badge ${statusClass}">● ${statusLabel}</span>
        <div class="card-actions">
          <button class="btn btn-secondary" style="flex:1;font-size:0.8rem" onclick='openEdit(${JSON.stringify(item)})'>✏️ Edit</button>
          <button class="btn btn-danger" style="flex:1;font-size:0.8rem" onclick="deleteMedia('${item.id}')">🗑 Delete</button>
        </div>
      </div>`;
    grid.appendChild(card);
  }

  function openEdit(item) {
    document.getElementById('edit-id').value = item.id;
    document.getElementById('edit-title').value = item.title;
    document.getElementById('edit-tags').value = Array.isArray(item.tags) ? item.tags.join(', ') : (item.tags || '');
    document.getElementById('edit-modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('active');
  }

  async function saveEdit() {
    const id    = document.getElementById('edit-id').value;
    const title = document.getElementById('edit-title').value.trim();
    const tags  = document.getElementById('edit-tags').value.trim();

    try {
      const res = await fetch(`${API_BASE}/UpdateMedia/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, tags: tags.split(',').map(t => t.trim()).filter(Boolean) })
      });
      if (!res.ok) throw new Error(await res.text());
      closeModal();
      loadMedia();
    } catch (e) {
      alert(`Update failed: ${e.message}`);
    }
  }

  async function deleteMedia(id) {
    if (!confirm('Delete this media item?')) return;
    try {
      const res = await fetch(`${API_BASE}/DeleteMedia/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(await res.text());
      loadMedia();
    } catch (e) {
      alert(`Delete failed: ${e.message}`);
    }
  }

  // Load on page start
  loadMedia();
</script>
</body>
</html>
